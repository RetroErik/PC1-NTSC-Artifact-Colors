  <text x="1372" y="668" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a1a">Aqua</text>
  <text x="1372" y="691" text-anchor="middle" font-size="10" font-family="Consolas, monospace" fill="#1a1a1a" opacity="0.7">#49FFFF</text>

