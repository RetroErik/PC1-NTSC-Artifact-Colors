  <rect x="537" y="490" width="331" height="112" rx="3" fill="#929292"/>
  <text x="547" y="508" font-size="12" font-family="Consolas, monospace" font-weight="bold" fill="#1a1a1a">5: CC</text>
  <text x="702" y="552" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a1a">Dark Grey</text>
  <text x="702" y="575" text-anchor="middle" font-size="10" font-family="Consolas, monospace" fill="#1a1a1a" opacity="0.7">#929292</text>

  <!-- Cell (1,2): Index 6, CM, Magenta, #920092 -->
  <rect x="872" y="490" width="331" height="112" rx="3" fill="#920092"/>
  <text x="882" y="508" font-size="12" font-family="Consolas, monospace" font-weight="bold" fill="#ffe880">6: CM</text>
  <text x="1037" y="552" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffe880">Magenta</text>
  <text x="1037" y="575" text-anchor="middle" font-size="10" font-family="Consolas, monospace" fill="#ffe880" opacity="0.7">#920092</text>

  <!-- Cell (1,3): Index 7, CW, Light Blue, #4949FF -->
  <rect x="1207" y="490" width="331" height="112" rx="3" fill="#4949FF"/>
  <text x="1217" y="508" font-size="12" font-family="Consolas, monospace" font-weight="bold" fill="#ffe880">7: CW</text>
  <text x="1372" y="552" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffe880">Light Blue</text>
  <text x="1372" y="575" text-anchor="middle" font-size="10" font-family="Consolas, monospace" fill="#ffe880" opacity="0.7">#4949FF</text>

  <!-- ==================== ROW 2: LEFT = MAGENTA ==================== -->

  <!-- Cell (2,0): Index 8, MB, Brown, #924900 -->
  <rect x="202" y="606" width="331" height="112" rx="3" fill="#924900"/>
  <text x="212" y="624" font-size="12" font-family="Consolas, monospace" font-weight="bold" fill="#ffe880">8: MB</text>
  <text x="367" y="668" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffe880">Brown</text>
  <text x="367" y="691" text-anchor="middle" font-size="10" font-family="Consolas, monospace" fill="#ffe880" opacity="0.7">#924900</text>

  <!-- Cell (2,1): Index 9, MC, Bright Green, #24FF24 -->
  <rect x="537" y="606" width="331" height="112" rx="3" fill="#24FF24"/>
  <text x="547" y="624" font-size="12" font-family="Consolas, monospace" font-weight="bold" fill="#1a1a1a">9: MC</text>
  <text x="702" y="668" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a1a">Bright Green</text>
  <text x="702" y="691" text-anchor="middle" font-size="10" font-family="Consolas, monospace" fill="#1a1a1a" opacity="0.7">#24FF24</text>

  <!-- Cell (2,2): Index 10, MM, Grey, #494949 -->
  <rect x="872" y="606" width="331" height="112" rx="3" fill="#494949"/>
  <text x="882" y="624" font-size="12" font-family="Consolas, monospace" font-weight="bold" fill="#ffe880">10: MM</text>
  <text x="1037" y="668" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffe880">Grey</text>
  <text x="1037" y="691" text-anchor="middle" font-size="10" font-family="Consolas, monospace" fill="#ffe880" opacity="0.7">#494949</text>

  <!-- Cell (2,3): Index 11, MW, Aqua, #49FFFF -->
  <rect x="1207" y="606" width="331" height="112" rx="3" fill="#49FFFF"/>
