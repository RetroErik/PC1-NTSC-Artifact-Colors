  <rect x="1207" y="374" width="331" height="112" rx="3" fill="#00B6DB"/>
  <text x="1217" y="392" font-size="12" font-family="Consolas, monospace" font-weight="bold" fill="#1a1a1a">3: BW</text>
  <text x="1372" y="436" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a1a">Cyan</text>
  <text x="1372" y="459" text-anchor="middle" font-size="10" font-family="Consolas, monospace" fill="#1a1a1a" opacity="0.7">#00B6DB</text>

