  <line x1="200" y1="604" x2="1540" y2="604" stroke="#d4a020" stroke-width="1.5"/>
  <line x1="200" y1="720" x2="1540" y2="720" stroke="#d4a020" stroke-width="1.5"/>

  <!-- ==================== ROW 0: LEFT = BLACK ==================== -->

