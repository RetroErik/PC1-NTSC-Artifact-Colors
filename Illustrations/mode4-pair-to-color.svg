  <text x="212" y="508" font-size="12" font-family="Consolas, monospace" font-weight="bold" fill="#ffe880">4: CB</text>
  <text x="367" y="552" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffe880">Dark Red</text>
  <text x="367" y="575" text-anchor="middle" font-size="10" font-family="Consolas, monospace" fill="#ffe880" opacity="0.7">#920000</text>

